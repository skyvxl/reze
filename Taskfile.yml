# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  BIN_DIR: bin
  MODULE: github.com/skyvxl/reze
  MAIN_PKG: ./cmd/reze
  VERSION:
    sh: git describe --tags --always --dirty || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD || echo none
  BUILD_DATE:
    sh: git log -1 --format=%cI || echo unknown
  LDFLAGS: >-
    -X {{.MODULE}}/internal/buildinfo.Version={{.VERSION}} -X
    {{.MODULE}}/internal/buildinfo.Commit={{.COMMIT}} -X
    {{.MODULE}}/internal/buildinfo.BuildDate={{.BUILD_DATE}}

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build reze binary
    cmds:
      - cmd: powershell -NoProfile -Command "New-Item -ItemType Directory -Force {{.BIN_DIR}} | Out-Null"
        platforms: [ windows ]
      - cmd: mkdir -p {{.BIN_DIR}}
        platforms: [ linux, darwin ]
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/reze{{exeExt}} {{.MAIN_PKG}}

  clean:
    desc: Remove build artifacts
    cmds:
      - cmd: powershell -NoProfile -Command "if (Test-Path {{.BIN_DIR}}) { Remove-Item -Recurse -Force {{.BIN_DIR}} }"
        platforms: [ windows ]
      - cmd: rm -rf {{.BIN_DIR}}
        platforms: [ linux, darwin ]

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  fmt:
    desc: Run gofmt
    cmds:
      - gofmt -s -w .

  test:
    desc: Run unit tests
    cmds:
      - go test ./... -count=1

  race:
    desc: Run tests with race detector (required before push)
    cmds:
      - go test ./... -race -count=1

  tidy:
    desc: Tidy go.mod
    cmds:
      - go mod tidy

  version:
    desc: Show build variables
    cmds:
      - "echo VERSION:    {{.VERSION}}"
      - "echo COMMIT:     {{.COMMIT}}"
      - "echo BUILD_DATE: {{.BUILD_DATE}}"