version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - revive
    - gosec
    - misspell

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

      disabled-checks:
        - uncheckedInlineErr

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofumpt
    - goimports
